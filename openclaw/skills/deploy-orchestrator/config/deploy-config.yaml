environment: production
registry:
  provider: ghcr
  base_url: ghcr.io
  repository: owner/repo
  package_name: web-app
paths:
  compose_file: /opt/web-app/docker-compose.yml
  nginx_conf: /opt/web-app/nginx/nginx.conf
  sqlite_db: /opt/openclaw/state/deploy-state.db
  runtime_dir: /opt/openclaw/deploy-orchestrator
services:
  blue: app-blue
  green: app-green
  edge: nginx
health:
  route: /
  retries: 3
  timeout_seconds: 10
  sleep_seconds: 2
  public_base_url: http://localhost:8080
traffic:
  switch_method: nginx-upstream-inline
  reload_command: docker compose restart nginx
